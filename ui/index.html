<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dnyanajyoti Library Advertisement</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Welcome to Dnyanajyoti Library</h1>
            <p>Your Gateway to Knowledge and Learning</p>
        </div>
        <div class="features">
            <div class="feature">
                <img src="https://picsum.photos/seed/book/300/200" alt="Extensive Collection of Books">
                <h3>Extensive Collection</h3>
                <p>Thousands of books across all subjects</p>
            </div>
            <div class="feature">
                <img src="https://picsum.photos/seed/room/300/200" alt="Study Spaces">
                <h3>Study Spaces</h3>
                <p>Quiet areas for focused study</p>
            </div>
            <div class="feature">
                <img src="https://picsum.photos/seed/online/300/200" alt="Digital Resources">
                <h3>Digital Resources</h3>
                <p>Access to online journals and databases</p>
            </div>
            <div class="feature">
                <img src="https://picsum.photos/seed/time/300/200" alt="Student Friendly Environment">
                <h3>Student Friendly</h3>
                <p>Extended hours and helpful staff</p>
            </div>
        </div>
        <div class="cta">
            <button>Visit Us Today!</button>
        </div>
    </div>
</body>
</html>
