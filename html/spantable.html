<!DOCTYPE html>
<html>
<head>
    <title>span Table Example</title>
    </head>
    <body>
       <table border="1" style="width: 50%;">
        <tr>
            <td colspan="4">1</td>
        </tr> 
        <tr>
            <td rowspan="2">1</td>
            <td>2</td>
            <td>3</td>
            <td rowspan="2">4</td>
        </tr> 
        <tr>
            <td>2</td>
            <td>3</td>
        </tr> 
        <tr>
            <td colspan="4">1</td>
        </tr>   
     </table>
    </body>
</html>
