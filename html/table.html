<!DOCTYPE html>
<html>
<head>
    <title>Table Example</title>
    </head>
    <body>
        <table border="1" style="width: 50%; height: 50%;">
            <caption style="caption-side: bottom; font-size: 1.2em; text-align: left;">IPL Team Information</caption>
            <tr>
                <th>sr/no</th>
                <th>name</th>
                <th>team</th>
            </tr>
            <tr>
                <td>1</td>
                <td>dhoni</td>
                <td>csk</td>
            </tr>
            <tr>
                <td>2</td>
                <td>virat</td>
                <td>rcb</td>
            </tr>
            <tr>
                <td>3</td>
                <td>rohit</td>
                <td>mi</td>
            </tr>
        </table>
    </body>
</html>
