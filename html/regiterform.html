<!DOCTYPE html>
<html>
    <head>
        <title> Student Registration Form </title>
    </head>
    <body>
        <form>
            <fieldset>
                <legend>Personal Information</legend>
                <label>Full Name:</label>
                <input type="text" name="full name" placeholder="Enter your name">
                <br><br>
                <label>Email:</label>
                <input type="text" name="Email">
                <br><br>
                <label>Password:</label>
                <input type="password" name="password">
                <br><br>
                <label>phone:</label>
                <input type="text" name="phone" placeholder="10 digit number">
                <br><br>
                <label>Website:</label>
                <input type="url" name="website" placeholder="https://www.example.com">
                <br><br>
                <label>Search Course:</label>
                <input type="text" name="course" placeholder="courses....">
                <br><br>
            </fieldset>
            <br><br>
            <fieldset>
                <legend>Other Details</legend>
                <label>Age:</label>
                <input type="number" name="age">
                <br><br>
                <label>date of birth:</label>
                <input type="date" name="dob">
                <br><br>
                <label>prefferd time:</label>
                <input type="time" name="time">
                <br><br>    
                <label>Meeting Date and Time:</label>
                <input type="datetime-local" name="meeting">
            </fieldset>
        </form>
    </body>
</html>
